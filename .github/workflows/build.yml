# 云端编译 + Docker 镜像：anyclaw-manager（API + 前端合一）
name: Build All

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-server:
    name: Build AnyClaw-Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AnyClaw-Server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: AnyClaw-Server/go.mod
          cache-dependency-path: AnyClaw-Server/go.sum

      - name: Generate
        run: go generate ./...

      - name: Build
        run: go build -tags stdjson -o /tmp/openclaw ./cmd/anyclaw

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyclaw-server
          path: /tmp/openclaw

  build-api:
    name: Build AnyClaw-API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AnyClaw-API
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: AnyClaw-API/go.mod
          cache-dependency-path: AnyClaw-API/go.sum

      - name: Generate go.sum
        run: go mod tidy

      - name: Build
        run: go build -o /tmp/anyclaw-api ./cmd/api

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyclaw-api
          path: /tmp/anyclaw-api

  build-web:
    name: Build AnyClaw-Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AnyClaw-Web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:8080' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyclaw-web
          path: AnyClaw-Web/dist

  docker-server:
    name: Docker anyclaw-server
    needs: [build-server]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: https://index.docker.io/v1/
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push anyclaw-server (full)
        uses: docker/build-push-action@v6
        with:
          context: ./AnyClaw-Server
          file: ./AnyClaw-Server/docker/Dockerfile.full
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/anyclaw-server:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/anyclaw-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  docker-manager:
    name: Docker anyclaw-manager
    needs: [build-api, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: https://index.docker.io/v1/
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./AnyClaw-API/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            CACHE_BUST=${{ github.sha }}
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/anyclaw-manager:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/anyclaw-manager:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
