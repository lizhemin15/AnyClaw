# 云端构建 Docker 镜像：Server / API
name: Docker Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

env:
  GHCR: ghcr.io

jobs:
  docker-server:
    name: Docker AnyClaw-Server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./AnyClaw-Server
          file: ./AnyClaw-Server/docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.GHCR }}/${{ github.repository_owner }}/anyclaw-server:latest
            ${{ env.GHCR }}/${{ github.repository_owner }}/anyclaw-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  docker-api:
    name: Docker AnyClaw-API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: AnyClaw-API/go.mod

      - name: Generate go.sum
        run: cd AnyClaw-API && go mod tidy

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./AnyClaw-API/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.GHCR }}/${{ github.repository_owner }}/anyclaw-api:latest
            ${{ env.GHCR }}/${{ github.repository_owner }}/anyclaw-api:${{ github.sha }}
            ${{ env.GHCR }}/${{ github.repository_owner }}/anyclaw-web:latest
            ${{ env.GHCR }}/${{ github.repository_owner }}/anyclaw-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
