services:
  # ─────────────────────────────────────────────
  # AnyClaw Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm anyclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  anyclaw-agent:
    image: docker.io/anyclaw/anyclaw-server:latest
    container_name: anyclaw-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.anyclaw
    entrypoint: ["anyclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # AnyClaw Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml up anyclaw-gateway
  # ─────────────────────────────────────────────
  anyclaw-gateway:
    image: docker.io/anyclaw/anyclaw-server:latest
    container_name: anyclaw-gateway
    restart: on-failure
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.anyclaw
