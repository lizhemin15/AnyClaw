services:
  # ─────────────────────────────────────────────
  # AnyClaw Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm anyclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  anyclaw-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: anyclaw-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.anyclaw/config.json:ro
      - anyclaw-workspace:/root/.anyclaw/workspace
      - anyclaw-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["anyclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # AnyClaw Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  anyclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: anyclaw-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    environment:
      ANYCLAW_API_URL: ${ANYCLAW_API_URL:-}
      ANYCLAW_INSTANCE_ID: ${ANYCLAW_INSTANCE_ID:-}
      ANYCLAW_TOKEN: ${ANYCLAW_TOKEN:-}
    volumes:
      # Configuration file
      - ../config/config.json:/root/.anyclaw/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - anyclaw-workspace:/root/.anyclaw/workspace
      # NPM cache for faster MCP server installs
      - anyclaw-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  anyclaw-workspace:
  anyclaw-npm-cache: # Cache npm packages to speed up MCP server installs
